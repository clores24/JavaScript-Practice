<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Document</title>

    <body>
        <h1>Number <br> Guessing <br>Game</h1>
        <label for="guess">Click your guess</label><br>
        <button id="1_btn" class="guessBtn" data-number="1">1</button>

        <button id="3_btn" class="guessBtn" data-number="3">3</button>
        <button id="4_btn" class="guessBtn" data-number="4">4</button>

        <button id="6_btn" class="guessBtn" data-number="6">6</button>
        <button id="7_btn" class="guessBtn" data-number="7">7</button>
        <button id="8_btn" class="guessBtn" data-number="8">8</button>
        <button id="9_btn" class="guessBtn" data-number="9">9</button>
        <button id="10_btn" class="guessBtn" data-number="10">10</button><br>
        <span id="attempts">Attempts: 0</span>
        <p id="result"></p>
        <script src="script.js"></script>
    </body>
</html>
